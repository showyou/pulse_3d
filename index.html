<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;font-family:'Orbitron',sans-serif;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;}
h1{font-size:clamp(36px,8vw,80px);font-weight:900;letter-spacing:10px;
  background:linear-gradient(135deg,#0ff 0%,#88f 40%,#f0f 70%,#ff8800 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.modes{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.mode-btn{display:block;padding:28px 52px;text-decoration:none;font-family:'Orbitron',sans-serif;
  font-size:clamp(14px,2.5vw,22px);font-weight:700;letter-spacing:5px;
  border:1px solid;border-radius:4px;transition:all 0.2s;text-align:center;}
.mode-btn.rhythm{border-color:rgba(0,200,255,.6);color:#00c8ff;box-shadow:0 0 20px rgba(0,200,255,.12);}
.mode-btn.rhythm:hover{background:rgba(0,200,255,.1);box-shadow:0 0 40px rgba(0,200,255,.35);}
.mode-btn.piano{border-color:rgba(170,255,0,.55);color:#aaff00;box-shadow:0 0 20px rgba(170,255,0,.12);}
.mode-btn.piano:hover{background:rgba(170,255,0,.08);box-shadow:0 0 40px rgba(170,255,0,.3);}
.sub{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.4vw,13px);
  color:rgba(255,255,255,.35);letter-spacing:3px;margin-top:6px;}
</style>
</head>
<body>
<h1>PULSE 3D</h1>
<div class="modes">
  <a href="rhythm.html" class="mode-btn rhythm">
    RHYTHM
    <div class="sub">6-KEY / 12-LANE</div>
  </a>
  <a href="piano.html" class="mode-btn piano">
    PIANO
    <div class="sub">FREE PLAY / 16-LANE</div>
  </a>
</div>
</body>
</html>
