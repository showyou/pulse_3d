<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PULSE 3D — PLAY MODE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#050810;font-family:'Orbitron',sans-serif;}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}

#hud{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}
#score-box{position:absolute;top:14px;left:20px;color:#fff;}
#score-val{font-size:clamp(24px,4vw,42px);font-weight:900;letter-spacing:2px;text-shadow:0 0 20px #0ff;}
#score-label{font-size:11px;letter-spacing:4px;color:#88eeff;margin-top:2px;}
#combo-box{position:absolute;top:50%;right:20px;transform:translateY(-50%);text-align:right;}
#combo-num{font-size:clamp(40px,6vw,68px);font-weight:900;color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff;}
#combo-label{font-size:12px;letter-spacing:4px;color:#88eeff;display:none;}
#judge-text{position:absolute;top:18%;left:50%;transform:translateX(-50%);font-size:clamp(28px,5vw,56px);font-weight:900;letter-spacing:3px;opacity:0;pointer-events:none;text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000;}
#note-name-pop{position:absolute;top:32%;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:clamp(18px,3vw,34px);letter-spacing:6px;opacity:0;pointer-events:none;text-shadow:0 0 20px currentColor;}

#scanline{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);z-index:20;pointer-events:none;}

/* ピアノUI */
#keyboard-ui{
  position:fixed;bottom:0;left:0;width:100%;z-index:15;
  display:flex;flex-direction:column;
  background:linear-gradient(to bottom,transparent,rgba(0,0,0,0.8));
}
#black-row{
  position:relative;
  height:11vh;
  pointer-events:all;
}
#white-row{
  display:flex;
  height:14vh;
  pointer-events:all;
}

.wkey{
  flex:1;
  background:linear-gradient(to bottom,#b8d8f0 0%,#e8f4ff 25%,#ffffff 60%,#ddf0ff 100%);
  border-left:1px solid rgba(80,180,255,0.4);
  border-top:2px solid rgba(0,200,255,0.6);
  border-radius:0 0 7px 7px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:6px;gap:2px;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background 0.04s,box-shadow 0.04s;
}
.wkey:last-child{border-right:1px solid rgba(80,180,255,0.4);}
.wkey.active{
  background:linear-gradient(to bottom,#00ffe5 0%,#66ffee 50%,#bbfffa 100%);
  box-shadow:0 0 24px #0ff,0 0 48px rgba(0,255,238,0.3),inset 0 -6px 12px rgba(0,200,200,0.2);
}
.wkey .klabel{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.4vw,14px);font-weight:700;color:rgba(0,30,60,0.5);}
.wkey .knote{font-family:'Share Tech Mono',monospace;font-size:clamp(6px,0.9vw,11px);color:rgba(0,30,60,0.35);}

.bkey{
  position:absolute;
  background:linear-gradient(to bottom,#0a1520 0%,#0d1b2a 60%,#152030 100%);
  border:1px solid rgba(0,180,255,0.35);
  border-top:2px solid rgba(0,160,220,0.5);
  border-radius:0 0 6px 6px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:4px;gap:1px;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background 0.04s,box-shadow 0.04s;
  height:100%;
  z-index:2;
  bottom:0;
}
.bkey.active{
  background:linear-gradient(to bottom,#00ddbb 0%,#006655 100%);
  box-shadow:0 0 20px #0fc,0 0 40px rgba(0,255,200,0.35);
}
.bkey .klabel{font-family:'Share Tech Mono',monospace;font-size:clamp(6px,1vw,11px);font-weight:700;color:rgba(255,255,255,0.45);}
.bkey .knote{font-family:'Share Tech Mono',monospace;font-size:clamp(5px,0.7vw,9px);color:rgba(255,255,255,0.28);}

#rotate-warn{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:#000;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#0ff;font-size:24px;letter-spacing:4px;}
@media (max-width:600px) and (orientation:portrait){#rotate-warn{display:flex;}}

#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;background:rgba(0,2,15,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
#start-screen h1{font-size:clamp(32px,8vw,76px);font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,#0ff 0%,#88f 40%,#f0f 70%,#ff8800 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ss-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,2vw,16px);letter-spacing:5px;color:#88eeff;}
.ss-hint{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.4vw,14px);color:rgba(255,255,255,0.45);letter-spacing:2px;text-align:center;line-height:2.2;}
.key-row-diag{display:flex;align-items:center;gap:6px;justify-content:center;}
.kchip{display:inline-block;padding:2px 7px;border:1px solid rgba(0,200,255,0.5);border-radius:3px;font-size:clamp(9px,1.2vw,13px);color:#aef;background:rgba(0,80,120,0.3);}
.kchip.black{background:rgba(0,30,50,0.7);border-color:rgba(0,150,200,0.4);color:#8de;}
#start-btn{margin-top:4px;padding:14px 52px;font-family:'Orbitron',sans-serif;font-size:clamp(14px,2.2vw,22px);font-weight:700;letter-spacing:5px;border:2px solid #0ff;background:transparent;color:#0ff;cursor:pointer;border-radius:4px;transition:all 0.2s;}
#start-btn:hover{background:#0ff;color:#000;box-shadow:0 0 28px #0ff;}
#pfx{position:fixed;top:0;left:0;width:100%;height:100%;z-index:8;pointer-events:none;}

/* 未使用キー */
.wkey.disabled{
  opacity:0.22;cursor:default;pointer-events:none;
  background:linear-gradient(to bottom,#1a2a38 0%,#223344 100%);
  box-shadow:none;border-color:rgba(40,80,110,0.3);
}
.bkey.disabled{
  opacity:0.18;cursor:default;pointer-events:none;
  background:linear-gradient(to bottom,#060c12 0%,#0a1018 100%);
  box-shadow:none;border-color:rgba(20,50,70,0.2);
}
/* オートプレイ進捗 */
#autoplay-bar{
  position:fixed;bottom:25vh;left:0;width:100%;height:3px;z-index:16;
  background:rgba(0,255,238,0.12);pointer-events:none;
}
#autoplay-bar-fill{
  height:100%;background:linear-gradient(to right,#0ff,#88f);
  width:0%;box-shadow:0 0 8px #0ff;
}
#autoplay-timer{
  position:fixed;bottom:calc(25vh + 8px);right:8px;
  font-family:'Share Tech Mono',monospace;font-size:12px;
  color:rgba(0,255,238,0.6);z-index:16;pointer-events:none;
  letter-spacing:2px;
}
/* ファイル選択セクション */
.file-section{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  width:100%;max-width:420px;
}
.file-section-label{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(8px,1.1vw,11px);color:rgba(255,255,255,0.35);
  letter-spacing:3px;text-transform:uppercase;
}
.file-pick-btn{
  padding:7px 22px;font-family:'Orbitron',sans-serif;
  font-size:clamp(9px,1.3vw,13px);letter-spacing:3px;
  border:1px solid rgba(0,255,238,0.4);background:rgba(0,60,100,0.25);
  color:#88eeff;cursor:pointer;border-radius:3px;transition:all 0.2s;width:100%;
}
.file-pick-btn:hover{background:rgba(0,100,150,0.4);border-color:#0ff;}
.file-status{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(8px,1.1vw,11px);color:rgba(0,255,200,0.55);
  letter-spacing:1px;min-height:1em;
}
.ss-or{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(9px,1.2vw,13px);color:rgba(255,255,255,0.3);letter-spacing:3px;
}
#autoplay-btn{
  padding:14px 52px;font-family:'Orbitron',sans-serif;
  font-size:clamp(14px,2.2vw,22px);font-weight:700;letter-spacing:5px;
  border:2px solid #88f;background:transparent;color:#88f;cursor:pointer;
  border-radius:4px;transition:all 0.2s;
}
#autoplay-btn:disabled{opacity:0.3;cursor:default;}
#autoplay-btn:not(:disabled):hover{background:#88f;color:#000;box-shadow:0 0 28px #88f;}

/* オクターブシフト表示 */
#oct-indicator{
  position:fixed;top:14px;right:20px;z-index:11;
  font-family:'Share Tech Mono',monospace;font-size:clamp(11px,1.8vw,18px);
  letter-spacing:3px;color:rgba(255,200,80,0.0);
  text-shadow:0 0 12px #fa0;transition:color 0.1s;pointer-events:none;
}
#oct-indicator.active{color:rgba(255,200,80,0.95);}

</style>
</head>
<body>
<div id="rotate-warn">↻ ROTATE DEVICE</div>
<div id="scanline"></div>
<canvas id="c"></canvas>
<canvas id="pfx"></canvas>

<div id="hud">
  <div id="score-box">
    <div id="score-val">0</div>
    <div id="score-label">SCORE</div>
  </div>
  <div id="combo-box">
    <div id="combo-num"></div>
    <div id="combo-label">COMBO</div>
  </div>
  <div id="judge-text"></div>
  <div id="note-name-pop"></div>
</div>

<div id="autoplay-bar"><div id="autoplay-bar-fill"></div></div>
<div id="autoplay-timer"></div>
<div id="oct-indicator">OCT +1</div>
<div id="keyboard-ui">
  <div id="black-row"></div>
  <div id="white-row"></div>
</div>

<div id="start-screen">
  <h1>PULSE 3D</h1>
  <div class="ss-sub">— PLAY MODE —</div>
  <div class="ss-hint">
    白鍵 (ASDの段): <span style="letter-spacing:1px">A S D F G H J K L</span><br>
    黒鍵 (QWEの段): <span style="letter-spacing:1px">W E &nbsp; T Y U &nbsp; O P</span><br>
    ピアノと同じ配置
  </div>
  <button id="start-btn">▶ START</button>
  <div class="ss-or">— or —</div>
  <div class="file-section">
    <div class="file-section-label">譜面ファイル</div>
    <input type="file" id="fumen-input" accept=".json" style="display:none">
    <button class="file-pick-btn" id="fumen-file-btn">♩ 譜面 JSON を選択</button>
    <div class="file-status" id="fumen-status">未選択</div>
  </div>
  <div class="file-section">
    <div class="file-section-label">BGM ファイル（任意）</div>
    <input type="file" id="bgm-input" accept="audio/*" style="display:none">
    <button class="file-pick-btn" id="bgm-file-btn">♪ 伴奏 audio を選択</button>
    <div class="file-status" id="bgm-status">未選択（なしでも再生可）</div>
  </div>
  <button id="autoplay-btn" disabled>▶ AUTOPLAY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ============================================================
// キーマッピング
// 白鍵: A S D F G H J K L → C4 D4 E4 F4 G4 A4 B4 C5 D5
// 黒鍵: W E _ T Y U _ O P → C#4 D#4 _ F#4 G#4 A#4 _ C#5 D#5
//   (afterWhite = その黒鍵が乗る白鍵インデックス(左の白鍵番号+1))
// ============================================================
const WHITE_KEYS = [
  {key:'a', note:'C4',  freq:261.63, lane:0},
  {key:'s', note:'D4',  freq:293.66, lane:2},
  {key:'d', note:'E4',  freq:329.63, lane:4},
  {key:'f', note:'F4',  freq:349.23, lane:5},
  {key:'g', note:'G4',  freq:392.00, lane:7},
  {key:'h', note:'A4',  freq:440.00, lane:9},
  {key:'j', note:'B4',  freq:493.88, lane:11},
  {key:'k', note:'C5',  freq:523.25, lane:12},
  {key:'l', note:'D5',  freq:587.33, lane:14},
];

// afterWhiteIdx: 白鍵配列上の位置 (左の白鍵index + 1) で右端を基準に配置
const BLACK_KEYS = [
  {key:'w', note:'C#4', freq:277.18, afterWhiteIdx:1, lane:1},
  {key:'e', note:'D#4', freq:311.13, afterWhiteIdx:2, lane:3},
  // E-F なし
  {key:'t', note:'F#4', freq:369.99, afterWhiteIdx:4, lane:6},
  {key:'y', note:'G#4', freq:415.30, afterWhiteIdx:5, lane:8},
  {key:'u', note:'A#4', freq:466.16, afterWhiteIdx:6, lane:10},
  // B-C なし
  {key:'o', note:'C#5', freq:554.37, afterWhiteIdx:8, lane:13},
  {key:'p', note:'D#5', freq:622.25, afterWhiteIdx:9, lane:15},
];

const ALL_KEYS = {};
WHITE_KEYS.forEach(k => ALL_KEYS[k.key] = k);
BLACK_KEYS.forEach(k => ALL_KEYS[k.key] = k);

const TOTAL_LANES = 16;

// fumen ロード後に確定する動的変数
let FUMEN          = null;
let ACTIVE_LANE_SET = new Set();
let ACTIVE_LANES    = [];
let ACTIVE_TOTAL    = 0;
let LANE_REMAP      = new Map();

// レーン色
// 白鍵: アイスブルー / 黒鍵: ネイビー
const _BLACK_LANE_SET_COLOR = new Set(BLACK_KEYS.map(k => k.lane));
const LANE_COLORS_HEX = Array.from({length:16}, (_,i) =>
  _BLACK_LANE_SET_COLOR.has(i) ? '#1a3a5a' : '#c8e8ff'
);
const LANE_COLORS_INT = LANE_COLORS_HEX.map(c => parseInt(c.replace('#',''), 16));

// ============================================================
// Three.js
// ============================================================
const canvas3d = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas:canvas3d, alpha:true, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.042);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 150);
camera.position.set(0, 5.5, 9);
camera.lookAt(0, 0, -8);

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  buildPianoUI();
  pfxCanvas.width = innerWidth;
  pfxCanvas.height = innerHeight;
});

// ============================================================
// ハイウェイ
// ============================================================
const LANE_W    = 0.52;
const LANE_GAP  = 0.018;
const LANE_UNIT = LANE_W + LANE_GAP;
const HIGHWAY_LEN = 44;

const hwGroup = new THREE.Group();
scene.add(hwGroup);

function buildHighway(){
  const totalHWWidth = ACTIVE_TOTAL * LANE_UNIT;
  // 古いメッシュを削除
  while(hwGroup.children.length>0) hwGroup.remove(hwGroup.children[0]);
  laneGlowMats = new Map();

  // 床
  const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(totalHWWidth + 0.6, HIGHWAY_LEN),
  new THREE.MeshBasicMaterial({color:0x001122, transparent:true, opacity:0.5, side:THREE.DoubleSide})
);
floorMesh.rotation.x = -Math.PI/2;
floorMesh.position.set(0, -0.01, -HIGHWAY_LEN/2 + 5);
hwGroup.add(floorMesh);

// 各レーン帯
laneGlowMats = new Map();
for(let i=0;i<TOTAL_LANES;i++){
  const x = (i - (TOTAL_LANES-1)/2) * LANE_UNIT;
  const isBlack = BLACK_KEYS.some(b=>b.lane===i);
  const mat = new THREE.MeshBasicMaterial({
    color: LANE_COLORS_INT[i],
    transparent:true,
    opacity: isBlack ? 0.055 : 0.08,
    side:THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(LANE_W - 0.04, HIGHWAY_LEN),
    mat
  );
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set(x, 0, -HIGHWAY_LEN/2+5);
  hwGroup.add(mesh);
  laneGlowMats.set(i, {mat, base: isBlack ? 0.055 : 0.08});
}

// 区切り線
for(let i=0;i<=TOTAL_LANES;i++){
  const x = (i - TOTAL_LANES/2) * LANE_UNIT - LANE_GAP/2;
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(0.02, HIGHWAY_LEN),
    new THREE.MeshBasicMaterial({color:0x1a3a55, transparent:true, opacity:0.4, side:THREE.DoubleSide})
  );
  m.rotation.x = -Math.PI/2;
  m.position.set(x, 0.001, -HIGHWAY_LEN/2+5);
  hwGroup.add(m);
}

// ヒットライン(3D)
const hitLine3D = new THREE.Mesh(
  new THREE.PlaneGeometry(totalHWWidth + 0.6, 0.07),
  new THREE.MeshBasicMaterial({color:0xff2233, transparent:true, opacity:0.88, side:THREE.DoubleSide})
);
hitLine3D.rotation.x = -Math.PI/2;
hitLine3D.position.set(0, 0.02, 4.2);
hwGroup.add(hitLine3D);
}

let laneGlowMats = new Map();
let hitLine3D = null;

// 星
const starsGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(900*3);
for(let i=0;i<900;i++){
  starPos[i*3]   = (Math.random()-0.5)*130;
  starPos[i*3+1] = Math.random()*50 + 2;
  starPos[i*3+2] = (Math.random()-0.5)*130;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starsGeo,
  new THREE.PointsMaterial({color:0xaaddff, size:0.18, transparent:true, opacity:0.65})));

// ============================================================
// ノーツ
// ============================================================
const NOTE_Z_SPAWN = -30;
const NOTE_Z_HIT   =  4.2;
const NOTE_Z_DEAD  =  9.0;
const NOTE_SPEED   =  7.2;
const NOTE_H = 0.2;

const activeNotes = [];

function getLaneX(laneIdx){
  const di = LANE_REMAP.has(laneIdx) ? LANE_REMAP.get(laneIdx) : laneIdx;
  return (di - (ACTIVE_TOTAL-1)/2) * LANE_UNIT;
}

function spawnNote(laneIdx){
  const x = getLaneX(laneIdx);
  const color = LANE_COLORS_INT[laneIdx];

  const geo = new THREE.BoxGeometry(LANE_W - 0.05, NOTE_H, 0.52);
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.93});
  const mesh = new THREE.Mesh(geo, mat);

  // 縁取り
  const edgeMesh = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.65})
  );
  mesh.add(edgeMesh);

  // 上面ハイライト
  const hl = new THREE.Mesh(
    new THREE.PlaneGeometry(LANE_W-0.1, 0.07),
    new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.55, side:THREE.DoubleSide})
  );
  hl.position.set(0, NOTE_H/2+0.001, 0);
  mesh.add(hl);

  mesh.position.set(x, NOTE_H/2, NOTE_Z_SPAWN);
  scene.add(mesh);
  activeNotes.push({mesh, alive:true});
}

// ============================================================
// パーティクル(2D)
// ============================================================
const pfxCanvas = document.getElementById('pfx');
const pfxCtx    = pfxCanvas.getContext('2d');
pfxCanvas.width  = innerWidth;
pfxCanvas.height = innerHeight;

const particles = [];

function spawnParticles(sx, sy, hexColor){
  for(let i=0;i<16;i++){
    const angle = Math.random()*Math.PI*2;
    const spd   = 2 + Math.random()*5;
    particles.push({
      x:sx, y:sy,
      vx:Math.cos(angle)*spd,
      vy:Math.sin(angle)*spd - 2.5,
      r: 2.5 + Math.random()*4,
      alpha:1,
      color:hexColor,
      decay:0.016 + Math.random()*0.014
    });
  }
}

function updateParticles(){
  pfxCtx.clearRect(0,0,pfxCanvas.width,pfxCanvas.height);
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.13;
    p.alpha -= p.decay;
    if(p.alpha<=0){particles.splice(i,1);continue;}
    pfxCtx.globalAlpha = p.alpha;
    pfxCtx.fillStyle   = p.color;
    pfxCtx.beginPath();
    pfxCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    pfxCtx.fill();
  }
  pfxCtx.globalAlpha=1;
}

function getLaneScreenX(laneIdx){
  const v = new THREE.Vector3(getLaneX(laneIdx), 0, NOTE_Z_HIT);
  v.project(camera);
  return (v.x*0.5+0.5)*innerWidth;
}
function getHitLineScreenY(){
  const v = new THREE.Vector3(0, 0, NOTE_Z_HIT);
  v.project(camera);
  return (v.y*-0.5+0.5)*innerHeight;
}

// ============================================================
// Audio
// ============================================================
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playPianoNote(freq){
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  // sin + triangle
  const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
  o1.type='sine';  o1.frequency.value = freq;
  o2.type='triangle'; o2.frequency.value = freq*2.0;

  const g1 = ctx.createGain(), g2 = ctx.createGain();
  g1.gain.setValueAtTime(0,now);
  g1.gain.linearRampToValueAtTime(0.42, now+0.008);
  g1.gain.exponentialRampToValueAtTime(0.14, now+0.14);
  g1.gain.exponentialRampToValueAtTime(0.001, now+1.1);

  g2.gain.setValueAtTime(0,now);
  g2.gain.linearRampToValueAtTime(0.10, now+0.005);
  g2.gain.exponentialRampToValueAtTime(0.001, now+0.38);

  // ハンマー音クリック
  const click = ctx.createOscillator();
  click.type='square'; click.frequency.value = freq*3.5;
  const cg = ctx.createGain();
  cg.gain.setValueAtTime(0.07, now);
  cg.gain.exponentialRampToValueAtTime(0.001, now+0.018);
  click.connect(cg); cg.connect(ctx.destination);
  click.start(now); click.stop(now+0.02);

  const filt = ctx.createBiquadFilter();
  filt.type='lowpass';
  filt.frequency.setValueAtTime(4500,now);
  filt.frequency.exponentialRampToValueAtTime(700,now+0.6);

  o1.connect(g1); o2.connect(g2);
  g1.connect(filt); g2.connect(filt);
  filt.connect(ctx.destination);

  o1.start(now); o2.start(now);
  o1.stop(now+1.2); o2.stop(now+0.5);
}

// ============================================================
// HUD
// ============================================================
let score=0, combo=0;
const scoreEl   = document.getElementById('score-val');
const comboNumEl= document.getElementById('combo-num');
const comboLblEl= document.getElementById('combo-label');
const judgeEl   = document.getElementById('judge-text');
const notePopEl = document.getElementById('note-name-pop');
let judgeTimer=0, notePopTimer=0;

function showJudge(txt,col){
  judgeEl.textContent=txt; judgeEl.style.color=col; judgeEl.style.opacity='1';
  judgeTimer=0.65;
}
function showNotePop(name,col){
  notePopEl.textContent=name; notePopEl.style.color=col; notePopEl.style.opacity='1';
  notePopTimer=0.5;
}
function addScore(pts){
  score+=pts;
  scoreEl.textContent=score.toLocaleString();
  scoreEl.style.transform='scale(1.18)';
  setTimeout(()=>scoreEl.style.transform='',80);
}
function bumpCombo(){
  combo++;
  comboNumEl.textContent=combo;
  comboLblEl.style.display='block';
  comboNumEl.style.transform='scale(1.3)';
  setTimeout(()=>comboNumEl.style.transform='',80);
}

// ============================================================
// レーングロー
// ============================================================
let glowTimers = new Map();
function triggerGlow(laneIdx){ glowTimers.set(laneIdx,1.0); }

// ============================================================
// ピアノUI構築
// ============================================================
const keyDomMap = {};

function buildPianoUI(){
  const whiteRow = document.getElementById('white-row');
  const blackRow = document.getElementById('black-row');
  whiteRow.innerHTML='';
  blackRow.innerHTML='';

  const wCount = WHITE_KEYS.length;   // 9
  const wPct   = 100 / wCount;        // % per white key

  // 白鍵
  WHITE_KEYS.forEach((k,i) => {
    const div = document.createElement('div');
    const wDisabled = !ACTIVE_LANE_SET.has(k.lane);
    div.className = wDisabled ? 'wkey disabled' : 'wkey';
    div.innerHTML=`<span class="klabel">${k.key.toUpperCase()}</span><span class="knote">${k.note}</span>`;
    whiteRow.appendChild(div);
    if(!wDisabled){
      div.addEventListener('pointerdown',e=>{e.preventDefault();triggerKey(k.key);});
      div.addEventListener('pointerup',  e=>{e.preventDefault();releaseKey(k.key);});
      div.addEventListener('pointerleave',e=>{e.preventDefault();releaseKey(k.key);});
    }
    keyDomMap[k.key]=div;
  });

  // 黒鍵 — 白鍵のafterWhiteIdx番目の右端付近に絶対配置
  // 幅 = 白鍵幅の0.62倍
  const bwPct = wPct * 0.62;
  BLACK_KEYS.forEach(k => {
    const div = document.createElement('div');
    const bDisabled = !ACTIVE_LANE_SET.has(k.lane);
    div.className = bDisabled ? 'bkey disabled' : 'bkey';
    div.innerHTML=`<span class="klabel">${k.key.toUpperCase()}</span><span class="knote">${k.note}</span>`;
    const centerPct = k.afterWhiteIdx * wPct;
    div.style.left  = `calc(${centerPct}% - ${bwPct/2}%)`;
    div.style.width  = `${bwPct}%`;
    div.style.minWidth='22px';
    blackRow.appendChild(div);
    if(!bDisabled){
      div.addEventListener('pointerdown',e=>{e.preventDefault();triggerKey(k.key);});
      div.addEventListener('pointerup',  e=>{e.preventDefault();releaseKey(k.key);});
      div.addEventListener('pointerleave',e=>{e.preventDefault();releaseKey(k.key);});
    }
    keyDomMap[k.key]=div;
  });
}

// ============================================================
// キー入力
// ============================================================
const pressedKeys = new Set();
let gameStarted = false;

function triggerKey(key){
  if(pressedKeys.has(key)) return;
  pressedKeys.add(key);
  if(keyDomMap[key]) keyDomMap[key].classList.add('active');
  if(!gameStarted) return;

  const kd = ALL_KEYS[key];
  if(!kd) return;
  if(!ACTIVE_LANE_SET.has(kd.lane)) return;

  const freq     = octShift ? kd.freq * 2 : kd.freq;
  const noteName = octShift ? kd.note.replace(/(\d)$/, n => +n+1) : kd.note;
  playPianoNote(freq);
  spawnNote(kd.lane);
  triggerGlow(kd.lane);

  // HUD
  bumpCombo();
  const mult = Math.max(1, Math.floor(combo/4));
  addScore(300*mult);
  showJudge('PERFECT!','#00ffee');
  showNotePop(noteName, LANE_COLORS_HEX[kd.lane]);

  // パーティクル
  spawnParticles(getLaneScreenX(kd.lane), getHitLineScreenY(), LANE_COLORS_HEX[kd.lane]);
}
function releaseKey(key){
  pressedKeys.delete(key);
  if(keyDomMap[key]) keyDomMap[key].classList.remove('active');
}

let octShift = false;
const octIndicator = document.getElementById('oct-indicator');
window.addEventListener('keydown',e=>{
  if(e.key==='Shift'){
    octShift=true; octIndicator.classList.add('active'); return;
  }
  if(e.repeat) return;
  triggerKey(e.key.toLowerCase());
});
window.addEventListener('keyup',e=>{
  if(e.key==='Shift'){
    octShift=false; octIndicator.classList.remove('active'); return;
  }
  releaseKey(e.key.toLowerCase());
});

// ============================================================
// スタート
// ============================================================
document.getElementById('start-btn').addEventListener('click',()=>{
  getAudioCtx();
  gameStarted=true;
  document.getElementById('start-screen').style.display='none';
});

// ============================================================
// メインループ
// ============================================================
let lastTime = performance.now();
let elapsed  = 0;

function animate(){
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now-lastTime)/1000, 0.05);
  lastTime  = now;

  // ノーツ移動
  for(let i=activeNotes.length-1;i>=0;i--){
    const n=activeNotes[i];
    n.mesh.position.z += NOTE_SPEED*dt;
    if(n.mesh.position.z > NOTE_Z_DEAD){
      scene.remove(n.mesh);
      activeNotes.splice(i,1);
    }
  }

  // レーングロー
  for(const i of ACTIVE_LANES){
    const gm = laneGlowMats.get(i);
    if(!gm) continue;
    let gt = glowTimers.get(i)||0;
    if(gt>0){
      gt = Math.max(0, gt-dt*3.5);
      glowTimers.set(i, gt);
      gm.mat.opacity = gm.base + gt*0.38;
    } else {
      gm.mat.opacity = gm.base;
    }
  }

  // HUDフェード
  if(judgeTimer>0){ judgeTimer-=dt; if(judgeTimer<=0) judgeEl.style.opacity='0'; }
  if(notePopTimer>0){ notePopTimer-=dt; if(notePopTimer<=0) notePopEl.style.opacity='0'; }

  // カメラドリフト
  if(gameStarted){
    elapsed+=dt;
    camera.position.x = Math.sin(elapsed*0.21)*0.16;
    camera.position.y = 5.5 + Math.sin(elapsed*0.34)*0.07;
    camera.lookAt(0,0,-8);
  }

  // オートプレイスケジューラ
  if(autoplayMode && autoplayStart !== null && FUMEN){
    const apElapsed = (performance.now()-autoplayStart)/1000;

    // ① TRAVEL_TIME 先行してノーツをスポーン
    while(autoSpawnIdx < FUMEN.notes.length &&
          FUMEN.notes[autoSpawnIdx].time - TRAVEL_TIME <= apElapsed){
      spawnNoteAtZ(FUMEN.notes[autoSpawnIdx].lane, NOTE_Z_SPAWN);
      autoSpawnIdx++;
    }
    // ② ヒット時刻に音・エフェクト
    while(autoAudioIdx < FUMEN.notes.length &&
          FUMEN.notes[autoAudioIdx].time <= apElapsed){
      hitAutoNoteEffects(FUMEN.notes[autoAudioIdx]);
      autoAudioIdx++;
    }

    const pct = Math.min(100, apElapsed/FUMEN.totalDuration*100);
    autoBarFill.style.width = pct+'%';
    autoTimerEl.textContent = fmtTime(apElapsed)+' / '+fmtTime(FUMEN.totalDuration);
    if(autoAudioIdx >= FUMEN.notes.length && apElapsed > FUMEN.totalDuration){
      autoplayMode = false;
      autoBarFill.style.width = '100%';
    }
  }

  // ヒットライン点滅
  if(hitLine3D) hitLine3D.material.opacity = 0.7 + Math.sin(Date.now()*0.006)*0.22;

  updateParticles();
  renderer.render(scene,camera);
}


// ============================================================
// レーン → キーデータ逆引き
// ============================================================
const LANE_TO_KEY = {};
WHITE_KEYS.forEach(k => LANE_TO_KEY[k.lane] = k);
BLACK_KEYS.forEach(k => LANE_TO_KEY[k.lane] = k);

// ============================================================
// 譜面 (fumen) ロード
// ============================================================
function loadFumenData(data) {
  FUMEN          = data;
  ACTIVE_LANE_SET = new Set(FUMEN.notes.map(n => n.lane));
  ACTIVE_LANES    = [...ACTIVE_LANE_SET].sort((a,b)=>a-b);
  ACTIVE_TOTAL    = ACTIVE_LANES.length;
  LANE_REMAP      = new Map(ACTIVE_LANES.map((orig,idx)=>[orig,idx]));
  glowTimers      = new Map(ACTIVE_LANES.map(l=>[l,0]));

  // 古いノーツを消す
  for(const n of activeNotes) scene.remove(n.mesh);
  activeNotes.length = 0;

  buildHighway();
  buildPianoUI();

  document.getElementById('fumen-status').textContent =
    '✓ ' + (FUMEN.title || 'fumen') + '  (' + FUMEN.notes.length + ' notes)';
  document.getElementById('autoplay-btn').disabled = false;
}

document.getElementById('fumen-file-btn').addEventListener('click', () => {
  document.getElementById('fumen-input').click();
});
document.getElementById('fumen-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  document.getElementById('fumen-status').textContent = '読み込み中...';
  try {
    const text = await file.text();
    loadFumenData(JSON.parse(text));
  } catch(err) {
    document.getElementById('fumen-status').textContent = '⚠ ' + err.message;
  }
});

// ============================================================
// BGM ファイル読み込み
// ============================================================
let bgmBuffer = null;
let bgmSource = null;

document.getElementById('bgm-file-btn').addEventListener('click', () => {
  document.getElementById('bgm-input').click();
});
document.getElementById('bgm-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('bgm-status');
  statusEl.textContent = '読み込み中...';
  try {
    const ctx = getAudioCtx();
    const buf = await file.arrayBuffer();
    bgmBuffer = await ctx.decodeAudioData(buf);
    statusEl.textContent = '✓ ' + file.name;
  } catch(err) {
    statusEl.textContent = '⚠ ' + err.message;
  }
});

// ============================================================
// オートプレイ
// ============================================================
const TRAVEL_TIME = (NOTE_Z_HIT - NOTE_Z_SPAWN) / NOTE_SPEED; // ~4.75s

let autoplayMode  = false;
let autoplayStart = null;
let autoSpawnIdx  = 0;
let autoAudioIdx  = 0;

const autoBarFill = document.getElementById('autoplay-bar-fill');
const autoTimerEl = document.getElementById('autoplay-timer');

function fmtTime(sec){
  const m = Math.floor(sec/60);
  const s = Math.floor(sec%60).toString().padStart(2,'0');
  return m+':'+s;
}

function spawnNoteAtZ(laneIdx, zPos){
  const x     = getLaneX(laneIdx);
  const color = LANE_COLORS_INT[laneIdx];
  const geo   = new THREE.BoxGeometry(LANE_W - 0.05, NOTE_H, 0.52);
  const mat   = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.93});
  const mesh  = new THREE.Mesh(geo, mat);
  mesh.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.65})
  ));
  const hl = new THREE.Mesh(
    new THREE.PlaneGeometry(LANE_W-0.1, 0.07),
    new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.55, side:THREE.DoubleSide})
  );
  hl.position.set(0, NOTE_H/2+0.001, 0);
  mesh.add(hl);
  mesh.position.set(x, NOTE_H/2, zPos);
  scene.add(mesh);
  activeNotes.push({mesh, alive:true});
}

function hitAutoNoteEffects(note){
  const kd = LANE_TO_KEY[note.lane];
  if(kd) playPianoNote(kd.freq);
  triggerGlow(note.lane);
  bumpCombo();
  const mult = Math.max(1, Math.floor(combo/4));
  addScore(300*mult);
  showJudge('PERFECT!','#00ffee');
  showNotePop(note.note, LANE_COLORS_HEX[note.lane]);
  spawnParticles(getLaneScreenX(note.lane), getHitLineScreenY(), LANE_COLORS_HEX[note.lane]);
  if(kd && keyDomMap[kd.key]){
    keyDomMap[kd.key].classList.add('active');
    setTimeout(()=>keyDomMap[kd.key].classList.remove('active'),120);
  }
}

function startAutoplay(){
  if(!FUMEN) return;
  const ctx = getAudioCtx();
  gameStarted   = true;
  autoplayMode  = true;
  autoplayStart = performance.now();
  autoSpawnIdx  = 0;
  autoAudioIdx  = 0;
  document.getElementById('start-screen').style.display='none';

  if(bgmBuffer){
    if(bgmSource){ try{ bgmSource.stop(); }catch(e){} }
    bgmSource = ctx.createBufferSource();
    bgmSource.buffer = bgmBuffer;
    bgmSource.connect(ctx.destination);
    bgmSource.start(ctx.currentTime);
  }

  // 開始時点で既に飛行中のはずのノーツを正しいZ位置から生成
  while(autoSpawnIdx < FUMEN.notes.length &&
        FUMEN.notes[autoSpawnIdx].time < TRAVEL_TIME){
    const note = FUMEN.notes[autoSpawnIdx];
    spawnNoteAtZ(note.lane, NOTE_Z_HIT - NOTE_SPEED * note.time);
    autoSpawnIdx++;
  }
}

document.getElementById('autoplay-btn').addEventListener('click', startAutoplay);
// ============================================================
// 初期化
// ============================================================
buildPianoUI();
animate();
</script>
